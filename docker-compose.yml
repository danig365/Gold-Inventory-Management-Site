services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ledger
      POSTGRES_PASSWORD: ledger
      POSTGRES_DB: ledger
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ledger"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "3001:3001"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DATABASE_URL=postgresql://ledger:ledger@db:5432/ledger
      - BACKUP_DIR=/app/backups
      - BACKUP_INTERVAL_MS=3600000
      - BACKUP_RETENTION_COUNT=48
      - ATTACHMENTS_DIR=/app/attachments
    volumes:
      - backupsdata:/app/backups
      - attachmentsdata:/app/attachments

volumes:
  pgdata:
  backupsdata:
  attachmentsdata:
